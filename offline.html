<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flow — You're offline</title>
<meta name="robots" content="noindex">
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fafaf9; color: #16181d; text-align: center; padding: 24px;
  }
  @media (prefers-color-scheme: dark) { body { background: #14151a; color: #edeef2; } }
  .mark { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg,#5b5fef,#4548d1); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p { color: #5b6270; max-width: 340px; margin: 0 auto 22px; font-size: 14px; line-height: 1.6; }
  @media (prefers-color-scheme: dark) { p { color: #9aa0ae; } }
  button { background: #5b5fef; color: #fff; border: none; padding: 12px 22px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
  <div>
    <div class="mark"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h1>You're offline</h1>
    <p>This page hasn't been cached yet. Once you've opened Flow while online at least once, it works fully offline from then on.</p>
    <button onclick="location.href='./'">Try again</button>
  </div>
</body>
</html>
